# NitroSense TrueHarmony — virtual EQ sink for PipeWire.
#
# Creates a sink "trueharmony_sink" whose audio passes through a 6-band
# parametric EQ before reaching the real output. The Nitro Sense app switches
# "Content Mode" by setting the per-band Gain controls live (pw-cli set-param),
# no restart needed.
#
# Install: copy to ~/.config/pipewire/pipewire.conf.d/ and restart pipewire.
# (packaging/install-trueharmony.sh does this for you.)

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "NitroSense TrueHarmony"
            media.name       = "NitroSense TrueHarmony"
            filter.graph = {
                nodes = [
                    { type = builtin name = ls label = bq_lowshelf  control = { "Freq" = 120   "Q" = 0.70 "Gain" = 0.0 } }
                    { type = builtin name = p1 label = bq_peaking    control = { "Freq" = 250   "Q" = 1.00 "Gain" = 0.0 } }
                    { type = builtin name = p2 label = bq_peaking    control = { "Freq" = 1000  "Q" = 1.00 "Gain" = 0.0 } }
                    { type = builtin name = p3 label = bq_peaking    control = { "Freq" = 3000  "Q" = 1.00 "Gain" = 0.0 } }
                    { type = builtin name = p4 label = bq_peaking    control = { "Freq" = 6000  "Q" = 1.00 "Gain" = 0.0 } }
                    { type = builtin name = hs label = bq_highshelf  control = { "Freq" = 10000 "Q" = 0.70 "Gain" = 0.0 } }
                ]
                links = [
                    { output = "ls:Out" input = "p1:In" }
                    { output = "p1:Out" input = "p2:In" }
                    { output = "p2:Out" input = "p3:In" }
                    { output = "p3:Out" input = "p4:In" }
                    { output = "p4:Out" input = "hs:In" }
                ]
                inputs  = [ "ls:In" ]
                outputs = [ "hs:Out" ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name        = "trueharmony_sink"
                node.description = "NitroSense TrueHarmony"
                media.class      = Audio/Sink
            }
            playback.props = {
                node.name    = "trueharmony_output"
                node.passive = true
                # Pinned to the real output so routing the virtual sink as default
                # can't loop back into itself. @SPEAKER_SINK@ is filled in by
                # install-trueharmony.sh with the internal speaker. Matches the
                # original TrueHarmony ("internal speaker and 3.5mm only").
                target.object = "@SPEAKER_SINK@"
            }
        }
    }
]
